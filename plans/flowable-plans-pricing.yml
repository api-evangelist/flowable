name: Flowable Plans and Pricing
description: >-
  Flowable offers three tiers ranging from a free open-source community edition
  to a full agentic process automation platform with AI agent orchestration.
  Enterprise tiers use a Users and RCPI (Runtime Case Process Instance)
  packaging model with custom pricing available on request.
url: https://www.flowable.com/pricing
created: '2026-06-13'
modified: '2026-06-13'
plans:
  - name: Community Edition
    description: >-
      Free, open-source edition under the Apache 2.0 license providing the core
      BPMN process engine, CMMN case engine, and DMN rules engine. Suitable for
      developers self-hosting and community-supported deployments.
    price: Free
    pricingModel: Open Source
    license: Apache-2.0
    url: https://www.flowable.com/open-source
    features:
      - BPMN process engine
      - CMMN case engine
      - DMN rules engine
      - Java API
      - REST API
      - Self-hosted deployment
      - Community forum support
    limitations:
      - No high availability (HA) clustering
      - No enterprise security features
      - No low-code design tools
      - No built-in reporting
      - No AI agent capabilities
      - Community support only (no SLA)
  - name: Flowable Platform
    description: >-
      Commercial enterprise edition including Flowable Work, Design, and Control
      applications. Adds high availability, enterprise security, low-code
      tooling, reporting, and configurable UI/forms on top of the open-source
      engines.
    price: Contact Sales
    pricingModel: Users and RCPI Packages
    url: https://www.flowable.com/pricing
    features:
      - All Community Edition engines
      - Unlimited process/case models
      - High availability clustering
      - Enterprise security (SSO, LDAP, SAML)
      - Low-code design environment (Flowable Design)
      - Reporting and analytics
      - Configurable UI and forms
      - Advanced content management
      - Advanced task management
      - Flowable Work application
      - Flowable Control application
      - Silver/Gold/Platinum support tiers
    support:
      - name: Silver
        hours: Business hours
        contacts: 2
        severity1ResponseTime: 6 hours
        severity2ResponseTime: 1 business day
        severity3ResponseTime: 2 business days
        severity4ResponseTime: 3 business days
      - name: Gold
        hours: 24/7/365
        contacts: 5
        severity1ResponseTime: 4 hours
        severity2ResponseTime: 8 hours
        severity3ResponseTime: 1 business day
        severity4ResponseTime: 2 business days
      - name: Platinum
        hours: 24/7/365
        contacts: 10
        severity1ResponseTime: 1 hour
        severity2ResponseTime: 4 hours
        severity3ResponseTime: 8 hours
        severity4ResponseTime: 1 business day
  - name: Agentic Case Platform
    description: >-
      Top-tier commercial edition adding the Flowable AI Studio for building,
      deploying, and orchestrating AI agents alongside human and automated
      process steps. Integrates with leading LLM providers including OpenAI,
      Azure OpenAI, and Anthropic.
    price: Contact Sales
    pricingModel: Users, RCPI and Agent Packages
    url: https://www.flowable.com/pricing
    features:
      - All Flowable Platform features
      - Flowable AI Studio
      - Orchestrator AI agent
      - Knowledge AI agent
      - Document AI agent
      - Utility AI agent
      - Agent-to-Agent (A2A) support
      - External agent support
      - LLM integration (OpenAI, Azure OpenAI, Anthropic)
      - AI-assisted modeling
      - Silver/Gold/Platinum support tiers
deploymentOptions:
  - On-Premises
  - Private Cloud
  - Public Cloud (AWS, Azure, GCP)
  - Docker / Kubernetes (containerized)
  - Embedded in Java application
notes: >-
  Pricing is not published publicly for the Platform and Agentic Case Platform
  tiers. Organizations must contact Flowable sales for a custom quote based on
  user counts, RCPI volumes, and agent package requirements. The Community
  Edition is permanently free and Apache-2.0 licensed.
