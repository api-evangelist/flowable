      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UserInfoRequest'
    ExecutionActionRequest:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ExecutionActionRequest'
    uploadDeployment:
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
