        description: Only return process instances with a tenant id like the given
          value ignoring case.
        required: false
        schema:
          type: string
      - name: withoutTenantId
        in: query
        description: If true, only returns process instances without a tenantId set.
          If false, the withoutTenantId parameter is ignored.
        required: false
        schema:
          type: boolean
      - name: sort
        in: query
        description: Property to sort on, to be used together with the order.
        required: false
        schema:
          type: string
          enum:
          - id
          - processDefinitionId
          - tenantId
          - processDefinitionKey
      - name: order
        in: query
        description: The sort order, either 'asc' or 'desc'. Defaults to 'asc'.
        required: false
        schema:
          type: string
      - name: start
        in: query
        description: Index of the first row to fetch. Defaults to 0.
        required: false
        schema:
          type: integer
      - name: size
        in: query
        description: Number of rows to fetch, starting from start. Defaults to 10.
        required: false
        schema:
          type: integer
      responses:
        '200':
          description: Indicates request was successful and the process-instances
            are returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataResponseProcessInstanceResponse'
        '400':
          description: Indicates a parameter was passed in the wrong format . The
            status-message contains additional information.
      security:
      - basicAuth: []
    post:
      tags:
      - Process Instances
      summary: Start a process instance
      description: "Note that also a *transientVariables* property is accepted as\
        \ part of this json, that follows the same structure as the *variables* property.\n\
        \nOnly one of *processDefinitionId*, *processDefinitionKey* or *message* can\
        \ be used in the request body. \n\nParameters *businessKey*, *variables* and\
        \ *tenantId* are optional.\n\nIf tenantId is omitted, the default tenant will\
        \ be used.\n\n It is possible to send variables, transientVariables and startFormVariables\
        \ in one request.\n\nMore information about the variable format can be found\
        \ in the REST variables section.\n\n Note that the variable-scope that is\
        \ supplied is ignored, process-variables are always local.\n\n"
      operationId: createProcessInstance
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcessInstanceCreateRequest'
      responses:
        '201':
          description: Indicates the process instance was created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessInstanceResponse'
        '400':
          description: Indicates either the process-definition was not found (based
            on id or key), no process is started by sending the given message or an
            invalid variable has been passed. Status description contains additional
            information about the error.
      security:
      - basicAuth: []
