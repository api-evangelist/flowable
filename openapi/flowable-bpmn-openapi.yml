        required: false
        schema:
          type: string
      - name: processInstanceIds
        in: query
        description: The process instance ids of the activity instances.
        required: false
        schema:
          type: string
      - name: processDefinitionId
        in: query
        description: The process definition id of the activity instance.
        required: false
        schema:
          type: string
      - name: tenantId
        in: query
