          schema:
            type: object
            properties:
              file:
                type: string
                format: binary
              name:
                example: intProcVar
                type: string
              type:
                example: integer
                type: string
              scope:
                example: global
                type: string
      description: Update a variable on an execution
    RestIdentityLink:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RestIdentityLink'
