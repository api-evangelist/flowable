  /identity/users/{userId}/picture:
    get:
      tags:
      - Users
      summary: Get a user’s picture
      description: The response body contains the raw picture data, representing the
        user’s picture. The Content-type of the response corresponds to the mimeType
        that was set when creating the picture.
      operationId: getUserPicture
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Indicates the user was found and has a picture, which is returned
            in the body.
          content:
            '*/*':
              schema:
                type: array
                items:
                  type: string
                  format: byte
        '404':
          description: Indicates the requested user was not found or the user does
            not have a profile picture. Status-description contains additional information
            about the error.
      security:
      - basicAuth: []
    put:
      tags:
      - Users
      summary: Updating a user’s picture
      description: 'The request should be of type multipart/form-data. There should
        be a single file-part included with the binary value of the picture. On top
        of that, the following additional form-fields can be present:


        mimeType: Optional mime-type for the uploaded picture. If omitted, the default
        of image/jpeg is used as a mime-type for the picture.'
      operationId: updateUserPicture
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  description: Picture to update
                  type: string
                  format: binary
              required:
              - file
        required: true
      responses:
        '204':
          description: Indicates the user was found and the picture has been updated.
            The response-body is left empty intentionally.
        '404':
          description: Indicates the requested user was not found.
      security:
      - basicAuth: []
