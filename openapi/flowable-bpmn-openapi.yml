          type: integer
          format: int32
        size:
          type: integer
          format: int32
        sort:
          type: string
        order:
          type: string
        activityId:
          type: string
        activityInstanceId:
          type: string
        activityName:
          type: string
        activityType:
          type: string
        executionId:
          type: string
        finished:
          type: boolean
        taskAssignee:
          type: string
        taskCompletedBy:
