    UserRequest:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UserRequest'
    RestActionRequest:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RestActionRequest'
    PropertyRequestBody:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PropertyRequestBody'
    ModelRequest:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ModelRequest'
    ExecutionVariableCollectionResource:
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              name:
                description: Required name of the variable
                example: Simple content item
                type: string
              type:
                description: Type of variable that is updated. If omitted, reverts
                  to raw JSON-value type (string, boolean, integer or double)
                example: integer
                type: string
              scope:
                description: Scope of variable to be returned. When local, only task-local
                  variable value is returned. When global, only variable value from
                  the task’s parent execution-hierarchy are returned. When the parameter
                  is omitted, a local variable will be returned if it exists, otherwise
