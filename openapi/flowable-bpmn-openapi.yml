          type: string
      - name: scopeDefinitionId
        in: query
        description: Only return historic task log entries with the given scopeDefinitionId.
        required: false
        schema:
          type: string
      - name: subScopeId
        in: query
        description: Only return historic task log entries with the given subScopeId
        required: false
