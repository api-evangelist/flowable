servers:
- url: http://localhost:8090/idm-api
- url: https://localhost:8090/idm-api
components:
  requestBodies:
    GroupRequest:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GroupRequest'
    UpdateUserPresenceRequest:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UpdateUserPresenceRequest'
      required: true
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
  schemas:
    AccessTokenResponse:
      type: object
      required:
      - creationTime
      - id
      - name
      properties:
        id:
          type: string
          description: The id of the token
        userId:
          type: string
          description: The id of the user that the token belongs to
        tenantId:
          type: string
          description: The id of the tenant that the token belongs to
        name:
          type: string
          description: The name of the token
        description:
          type: string
          description: The description of the token
        creationTime:
          type: string
          description: The creation time of the token in ISO 8601 format
        expirationTime:
          type: string
          description: The expiry time of the token in ISO 8601 format
      description: Response for an access token
    AddGroupPrivilegeRequest:
      type: object
      properties:
        groupId:
          type: string
    AddUserPrivilegeRequest:
      type: object
      properties:
        userId:
          type: string
    Application:
      type: object
      required:
      - id
      - name
      - type
      properties:
        id:
          type: string
          description: The id of the application
        name:
          type: string
          description: The name of the application
        type:
          type: string
          description: The type of the application
        url:
          type: string
          description: The public URL of the application
      description: The applications that the user has access to
    BasicPrivilegeResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
    ChangeUserLanguageRequest:
      type: object
      properties:
        newLanguage:
          type: string
    ChangeUserPasswordRequest:
      type: object
      properties:
        password:
          type: string
        repeatPassword:
          type: string
    ChangeUserThemeRequest:
      type: object
      properties:
        newTheme:
          type: string
    ContactFilterResponse:
      type: object
      required:
      - defaultFilter
      - id
      properties:
        id:
          type: string
          description: The id of the filter
        labelKey:
          type: string
          description: The key for the label of filter
        defaultLabelName:
          type: string
          description: The default name of the filter label
        defaultFilter:
          type: boolean
          description: Flag indicating whether this filter is a default one
      description: The response for the contact filters
    CreateAccessTokenRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          description: The name of the token
        description:
          type: string
          description: The description of the token
        validFor:
          type: string
          description: A positive ISO 8601 duration for which the token should be
            valid for. Mutually exclusive with validFor
        validUntil:
          type: string
          description: The ISO 8601 date until the token should be valid. Mutually
            exclusive with validFor
      description: Request for creating an access token for a user
    CreateAccessTokenResponse:
      type: object
      required:
      - creationTime
      - id
      - name
      - value
      properties:
        id:
          type: string
          description: The id of the token
        userId:
          type: string
          description: The id of the user that the token belongs to
        tenantId:
          type: string
          description: The id of the tenant that the token belongs to
        name:
          type: string
          description: The name of the token
        description:
          type: string
          description: The description of the token
        creationTime:
          type: string
          description: The creation time of the token in ISO 8601 format
        expirationTime:
          type: string
          description: The expiry time of the token in ISO 8601 format
        value:
          type: string
          description: The value of the token. This is only visible when the token
            is created. Afterwards it cannot be retrieved.
      description: Response for a newly created access token
    CreateUserRequest:
      type: object
