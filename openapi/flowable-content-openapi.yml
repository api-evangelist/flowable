        required: false
        schema:
          type: string
          format: date-time
      - name: createdBefore
        in: query
        description: Only return rendition items before given create date.
        required: false
        schema:
          type: string
          format: date-time
      - name: createdAfter
        in: query
        description: Only return rendition items after given create date.
        required: false
        schema:
          type: string
          format: date-time
      - name: lastModifiedOn
        in: query
        description: Only return rendition items with the given last modified date.
        required: false
        schema:
          type: string
          format: date-time
      - name: lastModifiedBefore
        in: query
        description: Only return rendition items before given last modified date.
        required: false
        schema:
          type: string
          format: date-time
      - name: lastModifiedAfter
        in: query
        description: Only return rendition items after given last modified date.
        required: false
        schema:
          type: string
          format: date-time
      - name: tenantId
        in: query
        description: Only return rendition items with the given tenantId.
        required: false
        schema:
          type: string
      - name: tenantIdLike
        in: query
        description: Only return rendition items with a tenantId like the given value.
        required: false
        schema:
          type: string
      - name: withoutTenantId
        in: query
        description: If true, only returns rendition items without a tenantId set.
          If false, the withoutTenantId parameter is ignored.
        required: false
        schema:
          type: boolean
      responses:
        '200':
          description: The rendition items are returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataResponseRenditionItemResponse'
      security:
      - basicAuth: []
  /rendition-service/rendition-items/{renditionItemId}:
    get:
      tags:
      - Rendition item
      summary: Get a rendition item
      description: ''
      operationId: getRenditionItem
      parameters:
      - name: renditionItemId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Indicates the rendition item was found and returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RenditionItemResponse'
        '404':
          description: Indicates the requested rendition item was not found.
      security:
      - basicAuth: []
    delete:
      tags:
      - Rendition item
      summary: Delete a rendition item
      description: ''
      operationId: deleteRenditionItem
      parameters:
      - name: renditionItemId
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Indicates the rendition item was deleted.
        '404':
          description: Indicates the rendition item was not found.
      security:
      - basicAuth: []
  /rendition-service/rendition-items/{renditionItemId}/data:
    get:
      tags:
      - Rendition item
      summary: Get the data of a content item
      description: The response body contains the binary content. By default, the
        content-type of the response is set to application/octet-stream unless the
        content item type contains a valid mime type.
      operationId: getRenditionItemData
      parameters:
      - name: renditionItemId
        in: path
        required: true
        schema:
          type: string
      - name: download
        in: query
        description: Explicitly request the content to be downloaded or viewed in
          a browser. By default it would be done based on the content media type
        required: false
        schema:
          type: boolean
      responses:
        '200':
          description: Indicates the rendition item was found and the requested content
            is returned.
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Resource'
        '404':
          description: Indicates the rendition item was not found or the content item
            doesn't have a binary stream available. Status message provides additional
            information.
      security:
      - basicAuth: []
  /rendition-service/rendition-items/{renditionItemId}/data/latest:
    get:
      tags:
      - Rendition item
      summary: Get the latest data of a rendition item
      description: The response body contains the binary content. By default, the
        content-type of the response is set to application/octet-stream unless the
        content item type contains a valid mime type.
      operationId: getLatestRenditionItemData
      parameters:
      - name: renditionItemId
        in: path
        required: true
        schema:
          type: string
      - name: download
        in: query
        description: Explicitly request the content to be downloaded or viewed in
          a browser. By default it would be done based on the content media type
        required: false
        schema:
          type: boolean
      responses:
        '200':
          description: Indicates the rendition item was found and the requested content
            is returned.
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Resource'
        '404':
          description: Indicates the rendition item was not found or the content item
            doesn't have a binary stream available. Status message provides additional
            information.
      security:
      - basicAuth: []
